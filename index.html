<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }
body {
  font-family:"Noto Sans TC","PingFang TC",sans-serif;

  color:#3a3430;

  align-items:center;

.wrap { width:100%; max-width:560px; padding:20px 18px 40px; }

.top .date { font-size:13px; letter-spacing:.18em; color:#a89880; }

/* 類別徽章 */
.chip {
  display:inline-flex; align-items:center; gap:6px;
  font-size:14px; font-weight:700;
  padding:6px 16px; border-radius:999px;
  margin:10px auto 14px;
}
.chip.fire   { background:#ffe3d6; color:#c2472c; }
.chip.amb    { background:#dff0e4; color:#2e7d4f; }
.chip.police { background:#dde9f7; color:#2b5d9e; }

/* 主卡片 + 滑動 */
.stage { position:relative; touch-action:pan-y; }
.card {
  background:#ffffff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(120,90,50,.12);
}
.card.slide-in-left  { animation:inL .32s cubic-bezier(.22,1,.36,1); }
.card.slide-in-right { animation:inR .32s cubic-bezier(.22,1,.36,1); }
@keyframes inL { from { opacity:0; transform:translateX(40px);} to { opacity:1; transform:none;} }
@keyframes inR { from { opacity:0; transform:translateX(-40px);} to { opacity:1; transform:none;} }
@media (prefers-reduced-motion: reduce){ .card{ animation:none !important } }
.photo {
  width:100%; aspect-ratio:4/3; object-fit:cover; display:block;
  background:#f0e8dc;
}
.body { padding:22px 22px 24px; }
.name { font-size:26px; font-weight:900; line-height:1.3; }
.country { font-size:15px; color:#8d7f6d; margin-top:4px; }

.facts { margin-top:16px; display:flex; flex-direction:column; gap:10px; }
.fact {
  display:flex; gap:10px; align-items:flex-start;
  font-size:16.5px; line-height:1.65;
}
.fact .dot { flex:none; margin-top:9px; width:8px; height:8px; border-radius:50%; background:#f0b429; }

/* 可點的詞彙 */
.w {
  font:inherit; border:none; cursor:pointer;
  background:#fff3d6; color:#8a5b13; font-weight:700;
  border-bottom:2px dashed #e0a93e;
  padding:0 3px; border-radius:6px 6px 0 0;
}
.w:active { background:#ffe7ae; }

.talk {
  margin-top:20px;
  background:#fff3d6;
  border-radius:16px;
  padding:14px 16px;
  font-size:15.5px; line-height:1.7;
}
.talk .t { font-size:12.5px; font-weight:700; letter-spacing:.14em; color:#b98a1e; margin-bottom:4px; }

/* 導覽（滑動提示 + 桌機箭頭） */
.nav {
  margin-top:16px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.nav button {
  border:none; cursor:pointer;
  background:#ffffff; color:#8d7f6d;
  font-size:15px; font-weight:700;
  padding:10px 18px; border-radius:999px;
  box-shadow:0 4px 14px rgba(120,90,50,.1);
  font-family:inherit;
}
.nav button:disabled { opacity:.35; cursor:default; }
.nav .hint { font-size:12px; color:#c4b49c; letter-spacing:.08em; text-align:center; flex:1; }
.backtoday {
  display:none; margin:14px auto 0;
  border:none; cursor:pointer; font-family:inherit;
  background:#3a3430; color:#fff8ef; font-size:14px; font-weight:700;
  padding:10px 22px; border-radius:999px;
}

/* 詞彙彈出卡 */
.sheet-mask {
  position:fixed; inset:0; background:rgba(58,52,48,.45);
  display:none; align-items:flex-end; justify-content:center; z-index:50;
}
.sheet-mask.open { display:flex; }
.sheet {
  width:100%; max-width:560px;
  background:#fffdf8; border-radius:24px 24px 0 0;
  padding:28px 24px 40px; text-align:center;
  animation:up .28s cubic-bezier(.22,1,.36,1);
}
@keyframes up { from { transform:translateY(40px); opacity:0 } to { transform:none; opacity:1 } }
.sheet .big { font-size:64px; line-height:1.2; }
.sheet .word { font-size:24px; font-weight:900; margin-top:8px; }
.sheet .desc { font-size:16.5px; line-height:1.8; color:#5c554e; margin-top:8px; }
.sheet .close {
  margin-top:18px; border:none; cursor:pointer; font-family:inherit;
  background:#f0e8dc; color:#5c554e; font-size:15px; font-weight:700;
  padding:10px 28px; border-radius:999px;
}

/* 小提示氣泡 */
#toast {
  position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
  background:#3a3430; color:#fff8ef;
  font-size:14.5px; padding:10px 20px; border-radius:999px;
  opacity:0; pointer-events:none; transition:.25s; z-index:60; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%); }

/* 頁尾 */
.foot { margin-top:26px; text-align:center; font-size:11.5px; color:#b3a48d; line-height:1.9; }
.foot a { color:inherit; }
</style>

/* ── 日期邏輯：以台北時間為準，每天自動換車 ── */
const EPOCH = "2026-07-10"; // 第 0 天
function taipeiToday() {
  return new Date().toLocaleDateString("en-CA", { timeZone: "Asia/Taipei" });
}
const todayStr = taipeiToday();
const todayNum = Math.round((new Date(todayStr) - new Date(EPOCH)) / 86400000); // 今天是第幾天
const dbg = new URLSearchParams(location.search).get("d");

let offset = 0; // 0=今天，-1=昨天…（不能看未來）
if (dbg !== null) offset = (+dbg) - todayNum; // ?d=N 直接跳到第 N 天（測試用）

function idxOf(dayNum) { return ((dayNum % VEHICLES.length) + VEHICLES.length) % VEHICLES.length; }

const el = id => document.getElementById(id);
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function renderFacts(facts){
  return facts.map(f=>{
    const html = esc(f).replace(/\[\[(.+?)\]\]/g, (_,w)=> DICT[w] ? `<button class="w" data-w="${w}">${w}</button>` : w);
    return `<div class="fact"><span class="dot"></span><span>${html}</span></div>`;
  }).join("");
}

function render(dir) {
  const dayNum = todayNum + offset;
  const v = VEHICLES[idxOf(dayNum)];
  const cat = CATS[v.cat];
  const dateObj = new Date(new Date(EPOCH).getTime() + dayNum * 86400000);
  const ds = dateObj.toLocaleDateString("en-CA");
  const [y,m,d] = ds.split("-");
  const week = ["日","一","二","三","四","五","六"][dateObj.getDay()];

  el("today-date").textContent = `${y} 年 ${+m} 月 ${+d} 日・星期${week}` + (offset === 0 ? "" : offset === -1 ? "（昨天）" : `（${-offset} 天前）`);
  el("chip").innerHTML = `<span class="chip ${cat.cls}">${cat.emoji} ${offset===0?"今天是":"這天是"}${cat.label}日</span>`;
  el("photo").src = v.img;
  el("name").textContent = v.name;
  el("country").textContent = v.country;
  el("facts").innerHTML = renderFacts(v.facts);
  el("talk").textContent = v.talk;
  el("license").textContent = v.license;
  document.title = `今日車車 ${cat.emoji} ${v.name}`;

  el("next").disabled = offset >= 0;
  el("prev").disabled = (dayNum <= 0);
  el("backtoday").style.display = offset < 0 ? "block" : "none";

  const card = el("card");
  card.classList.remove("slide-in-left","slide-in-right");
  if (dir) { void card.offsetWidth; card.classList.add(dir === "next" ? "slide-in-left" : "slide-in-right"); }
}

function toast(msg){
  const t = el("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 1800);
}
function goPrev(){ if (todayNum + offset > 0) { offset--; render("prev"); } }
function goNext(){
  if (offset < 0) { offset++; render("next"); }
  else toast("明天才有新的車車唷 🤫");
}
el("prev").onclick = goPrev;
el("next").onclick = goNext;
el("backtoday").onclick = () => { offset = 0; render("next"); };

/* 手指滑動（Pointer 事件：手機觸控與桌機拖曳都支援） */
let sx = null, sy = null;
const stage = el("stage");
stage.addEventListener("pointerdown", e => { sx = e.clientX; sy = e.clientY; }, {passive:true});
stage.addEventListener("pointerup", e => {
  if (sx === null) return;
  const dx = e.clientX - sx;
  const dy = e.clientY - sy;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) { dx < 0 ? goNext() : goPrev(); }
  sx = sy = null;
}, {passive:true});
stage.addEventListener("pointercancel", () => { sx = sy = null; }, {passive:true});

/* 詞彙彈出卡 */
document.addEventListener("click", e => {
  const b = e.target.closest(".w");
  if (!b) return;
  const d = DICT[b.dataset.w];
  el("s-emoji").textContent = d.emoji;
  el("s-word").textContent = b.dataset.w;
  el("s-desc").textContent = d.desc;
  el("sheet-mask").classList.add("open");
});
el("s-close").onclick = () => el("sheet-mask").classList.remove("open");
el("sheet-mask").addEventListener("click", e => { if (e.target === el("sheet-mask")) el("sheet-mask").classList.remove("open"); });

render();
</script>
</body>
</html>
