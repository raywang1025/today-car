<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fff8ef">
<title>今日車車 Today's Car</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }
body {
  font-family:"Noto Sans TC","PingFang TC",sans-serif;
  background:#fff8ef;
  color:#3a3430;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow-x:hidden;
}
.wrap { width:100%; max-width:560px; padding:20px 18px 40px; }

/* 頁首 */
.top { text-align:center; margin-bottom:14px; }
.top .date { font-size:13px; letter-spacing:.18em; color:#a89880; }
.top h1 { font-size:30px; font-weight:900; letter-spacing:.06em; margin-top:4px; }
.top h1 .en { display:block; font-size:12px; font-weight:500; letter-spacing:.3em; color:#c4b49c; margin-top:2px; }
.top .time-hint { font-size:12px; color:#c4b49c; margin-top:8px; }

.chip {
  display:inline-flex; align-items:center; gap:6px;
  font-size:14px; font-weight:700;
  padding:6px 16px; border-radius:999px;
  margin:10px auto 0;
}
.chip.fire   { background:#ffe3d6; color:#c2472c; }
.chip.amb    { background:#dff0e4; color:#2e7d4f; }
.chip.police { background:#dde9f7; color:#2b5d9e; }

/* 主卡片 + 滑動 */
.stage { position:relative; touch-action:pan-y; }
.card {
  background:#ffffff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(120,90,50,.12);
}
.card.slide-in-left  { animation:inL .32s cubic-bezier(.22,1,.36,1); }
.card.slide-in-right { animation:inR .32s cubic-bezier(.22,1,.36,1); }
@keyframes inL { from { opacity:0; transform:translateX(40px);} to { opacity:1; transform:none;} }
@keyframes inR { from { opacity:0; transform:translateX(-40px);} to { opacity:1; transform:none;} }
@media (prefers-reduced-motion: reduce){ .card{ animation:none !important } }
.photo { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:#f0e8dc; }
.head { padding:20px 22px 6px; }
.name { font-size:26px; font-weight:900; line-height:1.3; }
.country { font-size:15px; color:#8d7f6d; margin-top:4px; }

/* 段落（手風琴） */
.sec { border-top:1px solid #f3ece0; }
.sec-btn {
  width:100%; border:none; background:none; cursor:pointer;
  display:flex; align-items:center; gap:10px;
  padding:16px 22px; font-family:inherit; text-align:left;
}
.sec-btn .ico { font-size:22px; flex:none; }
.sec-btn .ti { font-size:17px; font-weight:900; flex:1; }
.sec-btn .mins { font-size:11.5px; color:#c4b49c; flex:none; }
.sec-btn .arrow { color:#c4b49c; flex:none; transition:.25s; font-size:13px; }
.sec.open .sec-btn .arrow { transform:rotate(90deg); }
.sec-body { display:none; padding:2px 22px 20px; }
.sec.open .sec-body { display:block; }

/* 認識它 */
.facts { display:flex; flex-direction:column; gap:10px; }
.fact { display:flex; gap:10px; align-items:flex-start; font-size:16.5px; line-height:1.65; }
.fact .dot { flex:none; margin-top:9px; width:8px; height:8px; border-radius:50%; background:#f0b429; }

/* 詞彙 */
.w { font:inherit; border:none; cursor:pointer; background:#fff3d6; color:#8a5b13; font-weight:700;
     border-bottom:2px dashed #e0a93e; padding:0 3px; border-radius:6px 6px 0 0; }
.w:active { background:#ffe7ae; }

/* 找一找 */
.find-item { background:#fbf6ec; border-radius:14px; padding:12px 14px; margin-bottom:10px; }
.find-item .q { font-size:15.5px; line-height:1.6; font-weight:700; }
.find-item .reveal { margin-top:8px; border:none; cursor:pointer; font-family:inherit;
  background:#f0e8dc; color:#5c554e; font-size:13.5px; font-weight:700; padding:7px 16px; border-radius:999px; }
.find-item .a { display:none; margin-top:8px; font-size:15px; line-height:1.7; color:#5c554e;
  background:#fff; border-radius:10px; padding:10px 12px; }
.find-item.shown .a { display:block; }
.find-item.shown .reveal { display:none; }

/* 裝備 */
.equip-item { display:flex; gap:12px; align-items:flex-start; margin-bottom:12px; }
.equip-item .en { font-size:15.5px; font-weight:900; flex:none; min-width:7.5em; }
.equip-item .ed { font-size:15px; line-height:1.65; color:#5c554e; }

/* 故事 */
.story-title { font-size:17px; font-weight:900; margin-bottom:10px; }
.story-text { font-size:16px; line-height:2; color:#4a443e; white-space:pre-line; }
.story-tip { margin-top:12px; font-size:12.5px; color:#b3a48d; }

/* 猜一猜 */
.quiz-item { margin-bottom:18px; }
.quiz-item .qq { font-size:16px; font-weight:900; line-height:1.6; margin-bottom:10px; }
.opt { display:block; width:100%; text-align:left; border:2px solid #f0e8dc; background:#fff;
  border-radius:12px; padding:11px 14px; font-size:15.5px; font-family:inherit; cursor:pointer; margin-bottom:8px; }
.opt.correct { border-color:#4caf7d; background:#eaf7f0; font-weight:700; }
.opt.wrong { border-color:#e08a8a; background:#fdeeee; animation:shake .3s; }
@keyframes shake { 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.quiz-why { display:none; font-size:14.5px; line-height:1.7; color:#2e7d4f;
  background:#eaf7f0; border-radius:10px; padding:10px 12px; margin-top:4px; }
.quiz-item.done .quiz-why { display:block; }

/* 動一動 / 聊一聊 */
.move-box { background:#fff3d6; border-radius:16px; padding:16px; font-size:15.5px; line-height:1.8; }
.talks { display:flex; flex-direction:column; gap:10px; }
.talk-item { display:flex; gap:10px; font-size:15.5px; line-height:1.7; }
.talk-item .n { flex:none; width:24px; height:24px; border-radius:50%; background:#f0b429; color:#fff;
  font-size:13px; font-weight:900; display:flex; align-items:center; justify-content:center; margin-top:3px; }

/* 導覽 */
.nav { margin-top:16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
.nav button { border:none; cursor:pointer; background:#ffffff; color:#8d7f6d;
  font-size:15px; font-weight:700; padding:10px 18px; border-radius:999px;
  box-shadow:0 4px 14px rgba(120,90,50,.1); font-family:inherit; }
.nav button:disabled { opacity:.35; cursor:default; }
.nav .hint { font-size:12px; color:#c4b49c; letter-spacing:.08em; text-align:center; flex:1; }
.backtoday { display:none; margin:14px auto 0; border:none; cursor:pointer; font-family:inherit;
  background:#3a3430; color:#fff8ef; font-size:14px; font-weight:700; padding:10px 22px; border-radius:999px; }

/* 詞彙彈出卡 */
.sheet-mask { position:fixed; inset:0; background:rgba(58,52,48,.45);
  display:none; align-items:flex-end; justify-content:center; z-index:50; }
.sheet-mask.open { display:flex; }
.sheet { width:100%; max-width:560px; background:#fffdf8; border-radius:24px 24px 0 0;
  padding:28px 24px 40px; text-align:center; animation:up .28s cubic-bezier(.22,1,.36,1); }
@keyframes up { from { transform:translateY(40px); opacity:0 } to { transform:none; opacity:1 } }
.sheet .big { font-size:64px; line-height:1.2; }
.sheet .word { font-size:24px; font-weight:900; margin-top:8px; }
.sheet .desc { font-size:16.5px; line-height:1.8; color:#5c554e; margin-top:8px; }
.sheet .close { margin-top:18px; border:none; cursor:pointer; font-family:inherit;
  background:#f0e8dc; color:#5c554e; font-size:15px; font-weight:700; padding:10px 28px; border-radius:999px; }

#toast { position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
  background:#3a3430; color:#fff8ef; font-size:14.5px; padding:10px 20px; border-radius:999px;
  opacity:0; pointer-events:none; transition:.25s; z-index:60; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%); }

.foot { margin-top:26px; text-align:center; font-size:11.5px; color:#b3a48d; line-height:1.9; }
.foot a { color:inherit; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="date" id="today-date"></div>
    <h1>今日車車<span class="en">TODAY'S CAR</span></h1>
    <div id="chip"></div>
    <div class="time-hint">🕐 一天一台車，陪玩大約 20 分鐘</div>
  </header>

  <div class="stage" id="stage">
    <main class="card" id="card"></main>
  </div>

  <div class="nav">
    <button id="prev">‹ 前一天</button>
    <div class="hint">左右滑動也可以換車唷</div>
    <button id="next">後一天 ›</button>
  </div>
  <button class="backtoday" id="backtoday">回到今天 🚗</button>

  <footer class="foot">
    每天早上自動換一台新的車車 🚗 有黃色虛線的詞可以按按看！<br>
    照片來自 <a href="https://commons.wikimedia.org" target="_blank" rel="noopener">Wikimedia Commons</a>（<span id="license"></span>）
  </footer>
</div>

<div class="sheet-mask" id="sheet-mask">
  <div class="sheet">
    <div class="big" id="s-emoji"></div>
    <div class="word" id="s-word"></div>
    <div class="desc" id="s-desc"></div>
    <button class="close" id="s-close">知道了！</button>
  </div>
</div>
<div id="toast"></div>

<script src="data.js"></script>
<script>
const { EPOCH, DICT, VEHICLES } = window.CAR_DATA;
const CATS = {
  fire:   { label:"消防車", emoji:"🚒", cls:"fire" },
  amb:    { label:"救護車", emoji:"🚑", cls:"amb" },
  police: { label:"警車",   emoji:"🚓", cls:"police" }
};

/* 日期邏輯：台北時間，每天自動換車 */
function taipeiToday() { return new Date().toLocaleDateString("en-CA", { timeZone: "Asia/Taipei" }); }
const todayStr = taipeiToday();
const todayNum = Math.round((new Date(todayStr) - new Date(EPOCH)) / 86400000);
const dbg = new URLSearchParams(location.search).get("d");
let offset = 0;
if (dbg !== null) offset = (+dbg) - todayNum;

function idxOf(n) { return ((n % VEHICLES.length) + VEHICLES.length) % VEHICLES.length; }
const el = id => document.getElementById(id);
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function vocab(s){
  return esc(s).replace(/\[\[(.+?)\]\]/g, (_,w)=> DICT[w] ? `<button class="w" data-w="${w}">${w}</button>` : w);
}

function sectionHTML(id, ico, title, mins, inner, open=false){
  return `<div class="sec ${open?"open":""}" id="sec-${id}">
    <button class="sec-btn" data-sec="${id}">
      <span class="ico">${ico}</span><span class="ti">${title}</span>
      <span class="mins">${mins}</span><span class="arrow">▶</span>
    </button>
    <div class="sec-body">${inner}</div>
  </div>`;
}

function render(dir) {
  const dayNum = todayNum + offset;
  const v = VEHICLES[idxOf(dayNum)];
  const cat = CATS[v.cat];
  const dateObj = new Date(new Date(EPOCH).getTime() + dayNum * 86400000);
  const ds = dateObj.toLocaleDateString("en-CA");
  const [y,m,d] = ds.split("-");
  const week = ["日","一","二","三","四","五","六"][dateObj.getDay()];

  el("today-date").textContent = `${y} 年 ${+m} 月 ${+d} 日・星期${week}` + (offset === 0 ? "" : offset === -1 ? "（昨天）" : offset < 0 ? `（${-offset} 天前）` : "（預覽）");
  el("chip").innerHTML = `<span class="chip ${cat.cls}">${cat.emoji} ${offset===0?"今天是":"這天是"}${cat.label}日</span>`;
  el("license").textContent = v.license;
  document.title = `今日車車 ${cat.emoji} ${v.name}`;

  const facts = `<div class="facts">` + v.facts.map(f=>`<div class="fact"><span class="dot"></span><span>${vocab(f)}</span></div>`).join("") + `</div>`;

  const find = v.find.map((f,i)=>`<div class="find-item" data-find="${i}">
      <div class="q">👀 ${vocab(f.q)}</div>
      <button class="reveal">看答案</button>
      <div class="a">💡 ${vocab(f.a)}</div>
    </div>`).join("");

  const equip = v.equip.map(e=>`<div class="equip-item">
      <div class="en">${esc(e.name)}</div><div class="ed">${vocab(e.desc)}</div>
    </div>`).join("");

  const story = `<div class="story-title">${esc(v.story.title)}</div>
    <div class="story-text">${esc(v.story.text)}</div>
    <div class="story-tip">📖 唸給孩子聽，遇到聲音的地方演出來更好玩！</div>`;

  const quiz = v.quiz.map((qz,qi)=>`<div class="quiz-item" data-quiz="${qi}">
      <div class="qq">Q${qi+1}. ${esc(qz.q)}</div>
      ${qz.opts.map((o,oi)=>`<button class="opt" data-oi="${oi}">${"ABC"[oi]}. ${esc(o)}</button>`).join("")}
      <div class="quiz-why">🎉 ${esc(qz.why)}</div>
    </div>`).join("");

  const move = `<div class="move-box">${esc(v.move)}</div>`;
  const talk = `<div class="talks">` + v.talk.map((t,i)=>`<div class="talk-item"><span class="n">${i+1}</span><span>${esc(t)}</span></div>`).join("") + `</div>`;

  el("card").innerHTML = `
    <img class="photo" src="${v.img}" alt="${esc(v.name)} 的照片">
    <div class="head"><div class="name">${esc(v.name)}</div><div class="country">${esc(v.country)}</div></div>
    ${sectionHTML("facts","🚗","認識它","2 分鐘",facts,true)}
    ${sectionHTML("find","🔍","找一找","4 分鐘",find)}
    ${sectionHTML("equip","🧩","厲害裝備","3 分鐘",equip)}
    ${sectionHTML("story","📖","出任務囉！","4 分鐘",story)}
    ${sectionHTML("quiz","❓","猜一猜","3 分鐘",quiz)}
    ${sectionHTML("move","🤸","動一動","2 分鐘",move)}
    ${sectionHTML("talk","💬","聊一聊","2 分鐘",talk)}
  `;

  el("next").disabled = offset >= 0 && dbg === null;
  el("prev").disabled = (dayNum <= 0);
  el("backtoday").style.display = offset < 0 ? "block" : "none";

  const card = el("card");
  card.classList.remove("slide-in-left","slide-in-right");
  if (dir) { void card.offsetWidth; card.classList.add(dir === "next" ? "slide-in-left" : "slide-in-right"); }
}

function toast(msg){
  const t = el("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 1800);
}
function goPrev(){ if (todayNum + offset > 0) { offset--; render("prev"); } }
function goNext(){
  if (offset < 0 || dbg !== null) { offset++; render("next"); }
  else toast("明天才有新的車車唷 🤫");
}
el("prev").onclick = goPrev;
el("next").onclick = goNext;
el("backtoday").onclick = () => { offset = 0; render("next"); };

/* 手指滑動（Pointer 事件） */
let sx = null, sy = null;
const stage = el("stage");
stage.addEventListener("pointerdown", e => { sx = e.clientX; sy = e.clientY; }, {passive:true});
stage.addEventListener("pointerup", e => {
  if (sx === null) return;
  const dx = e.clientX - sx, dy = e.clientY - sy;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) { dx < 0 ? goNext() : goPrev(); }
  sx = sy = null;
}, {passive:true});
stage.addEventListener("pointercancel", () => { sx = sy = null; }, {passive:true});

/* 事件代理：段落開合、找一找、猜一猜、詞彙 */
document.addEventListener("click", e => {
  const w = e.target.closest(".w");
  if (w) {
    const d = DICT[w.dataset.w];
    el("s-emoji").textContent = d.emoji;
    el("s-word").textContent = w.dataset.w;
    el("s-desc").textContent = d.desc;
    el("sheet-mask").classList.add("open");
    return;
  }
  const sb = e.target.closest(".sec-btn");
  if (sb) { sb.parentElement.classList.toggle("open"); return; }
  const rv = e.target.closest(".reveal");
  if (rv) { rv.closest(".find-item").classList.add("shown"); return; }
  const opt = e.target.closest(".opt");
  if (opt) {
    const item = opt.closest(".quiz-item");
    if (item.classList.contains("done")) return;
    const dayNum = todayNum + offset;
    const v = VEHICLES[idxOf(dayNum)];
    const qz = v.quiz[+item.dataset.quiz];
    if (+opt.dataset.oi === qz.ans) {
      opt.classList.add("correct");
      item.classList.add("done");
      item.querySelectorAll(".opt").forEach(o=>{ if(o!==opt) o.style.opacity=.45; o.disabled=true; });
    } else {
      opt.classList.add("wrong");
      toast("再猜猜看！");
      setTimeout(()=>opt.classList.remove("wrong"), 500);
    }
    return;
  }
});
el("s-close").onclick = () => el("sheet-mask").classList.remove("open");
el("sheet-mask").addEventListener("click", e => { if (e.target === el("sheet-mask")) el("sheet-mask").classList.remove("open"); });

render();
</script>
</body>
</html>
